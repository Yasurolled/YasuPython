name: Check Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          pip install pylint flake8 black

      - name: Lint build.sh (ShellCheck)
        run: |
          apt-get update && apt-get install -y shellcheck
          shellcheck build.sh || true

      - name: Lint Python files
        run: |
          find . -name "*.py" -type f ! -path "./micropython/*" ! -path "./esp-idf/*" | xargs flake8 || true

      - name: Check file structure
        run: |
          echo "Verifying project structure..."
          test -f build.sh && echo "✅ build.sh found"
          test -f README.md && echo "✅ README.md found"
          test -f FUNCTIONS.md && echo "✅ FUNCTIONS.md found"
          test -d user_c_modules/wifi_pro && echo "✅ user_c_modules/wifi_pro found"
          test -f user_c_modules/wifi_pro/wifi_pro.c && echo "✅ wifi_pro.c found"
          test -f user_c_modules/wifi_pro/micropython.mk && echo "✅ micropython.mk found"
          test -f user_c_modules/wifi_pro/micropython.cmake && echo "✅ micropython.cmake found"

      - name: Validate Markdown
        run: |
          pip install mdl markdownlint-cli2
          mdl README.md FUNCTIONS.md || true

      - name: Summary
        run: |
          echo "## Code Quality Check" >> $GITHUB_STEP_SUMMARY
          echo "✅ Code structure verified" >> $GITHUB_STEP_SUMMARY
          echo "✅ All essential files present" >> $GITHUB_STEP_SUMMARY
