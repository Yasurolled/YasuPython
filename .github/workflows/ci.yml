name: ESP32-S3 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget curl python3-pip cmake ninja-build ccache libffi-dev libssl-dev

      - name: Run build script
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Upload firmware artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-firmware
          path: build/*.bin
