name: YasuPython AI Build

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Repair Dependencies
        run: pip install requests

      - name: Attempt Initial Build
        id: build_attempt
        continue-on-error: true
        run: |
          chmod +x build.sh
          # Tüm çıktıyı log dosyasına kaydet
          ./build.sh 2>&1 | tee build_log.txt

      - name: Gemini AI Self-Repair
        # Sadece build başarısız olursa çalışır
        if: steps.build_attempt.outcome == 'failure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Build failed. Starting Gemini AI Repair..."
          python3 repair.py

      - name: Re-run Build After Repair
        if: steps.build_attempt.outcome == 'failure'
        run: |
          echo "Attempting build again after repair..."
          # Python kontrolünü bypass et ve tekrar dene
          export IDF_SKIP_CHECK=1
          ./build.sh

      - name: Upload Firmware Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: YasuPython-Firmware
          path: micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/firmware.bin
