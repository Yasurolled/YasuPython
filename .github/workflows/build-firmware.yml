name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          pip install pylint flake8 black

      - name: Lint build.sh (ShellCheck)
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck build.sh || true

      - name: Lint Python files
        run: |
          find . -name "*.py" -type f ! -path "./micropython/*" ! -path "./esp-idf/*" | xargs flake8 || true

      - name: Check file structure
        run: |
          echo "Verifying project structure..."
          test -f build.sh && echo "✅ build.sh found"
          test -f README.md && echo "✅ README.md found"
          test -f FUNCTIONS.md && echo "✅ FUNCTIONS.md found"
          test -d user_c_modules/wifi_pro && echo "✅ user_c_modules/wifi_pro found"
          test -f user_c_modules/wifi_pro/wifi_pro.c && echo "✅ wifi_pro.c found"
          test -f user_c_modules/wifi_pro/micropython.mk && echo "✅ micropython.mk found"
          test -f user_c_modules/wifi_pro/micropython.cmake && echo "✅ micropython.cmake found"

      - name: Validate Markdown
        run: |
          sudo apt-get update && sudo apt-get install -y npm
          npm install -g markdownlint-cli
          markdownlint README.md FUNCTIONS.md || true

  build:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            wget \
            curl \
            gcc \
            g++ \
            make \
            cmake \
            libusb-1.0-0-dev \
            libglib2.0-dev \
            libfdt-dev \
            libpixman-1-dev \
            zlib1g-dev \
            libncurses-dev \
            flex \
            bison \
            file

      - name: Cache ESP-IDF
        uses: actions/cache@v3
        with:
          path: ./esp-idf
          key: esp-idf-v5.5.1-${{ runner.os }}
          restore-keys: |
            esp-idf-v5.5.1-${{ runner.os }}

      - name: Cache mpy-cross
        uses: actions/cache@v3
        with:
          path: ./micropython/mpy-cross/build
          key: mpy-cross-${{ runner.os }}
          restore-keys: |
            mpy-cross-${{ runner.os }}

      - name: Clone MicroPython repository
        run: |
          if [ ! -d "micropython" ]; then
            git clone --depth 1 --branch v1.22.2 https://github.com/micropython/micropython.git
          fi

      - name: Clone ESP-IDF repository
        run: |
          if [ ! -d "esp-idf" ]; then
            git clone --depth 1 --branch v5.5.1 https://github.com/espressif/esp-idf.git
          fi

      - name: Verify user_c_modules directory
        run: |
          ls -la user_c_modules/
          ls -la user_c_modules/wifi_pro/

      - name: Run build script
        run: |
          chmod +x build.sh
          ./build.sh 2>&1 | tee build_output.log

      - name: Check if firmware.bin exists
        run: |
          if [ -f "micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/firmware.bin" ]; then
            ls -lh micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/firmware.bin
            echo "✅ Firmware build successful!"
          else
            echo "❌ Firmware build failed - firmware.bin not found"
            tail -50 build_output.log
            exit 1
          fi

      - name: Upload firmware artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-artifacts
          path: |
            micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/firmware.bin
            micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/micropython.bin
            micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/bootloader/bootloader.bin
            micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/partition_table/partition-table.bin
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.log
          retention-days: 30

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/firmware.bin" ]; then
            SIZE=$(ls -lh micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT/firmware.bin | awk '{print $5}')
            echo "✅ **Build Status:** SUCCESS" >> $GITHUB_STEP_SUMMARY
            echo "📦 **Firmware Size:** $SIZE" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Build Status:** FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts:**" >> $GITHUB_STEP_SUMMARY
          echo "- firmware.bin (complete image)" >> $GITHUB_STEP_SUMMARY
          echo "- micropython.bin (app only)" >> $GITHUB_STEP_SUMMARY
          echo "- bootloader.bin" >> $GITHUB_STEP_SUMMARY
          echo "- partition-table.bin" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Module:** wifi_pro" >> $GITHUB_STEP_SUMMARY
          echo "**Board:** ESP32_GENERIC_S3-SPIRAM_OCT" >> $GITHUB_STEP_SUMMARY
          echo "**MicroPython:** v1.22.2" >> $GITHUB_STEP_SUMMARY
          echo "**ESP-IDF:** v5.5.1" >> $GITHUB_STEP_SUMMARY

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with: 
          files: |
            firmware.bin
            micropython.bin
            bootloader.bin
            partition-table.bin
          body: |
            # MicroPython Firmware Release
            **WiFi Pro Module Build**
            This release contains the compiled MicroPython firmware for ESP32-S3 with the custom wifi_pro module.
            
            ## Files
            - `firmware.bin` - Complete firmware image (use for flashing)
            - `micropython.bin` - Application binary only
            - `bootloader.bin` - Second-stage bootloader
            - `partition-table.bin` - Flash partition layout
            
            ## Flashing
            ```bash
            python -m esptool --chip esp32s3 -b 460800 --before default_reset --after hard_reset \
              write_flash 0x0 firmware.bin
            ```
            
            See [README.md](../../README.md) for detailed instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
