name: Build YasuPython Firmware

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Build Script
        id: build_step
        continue-on-error: true # Allow the next step to run if this fails
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Gemini Self-Repair
        if: steps.build_step.outcome == 'failure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Build failed. Consulting Gemini..."
          # Capture the error logs
          ERROR_LOG=$(tail -n 50 build_log.txt || echo "No log found")
          
          # Use curl to ask Gemini for a fix
          RESPONSE=$(curl https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY \
              -H 'Content-Type: application/json' \
              -X POST \
              -d '{
                "contents": [{
                  "parts":[{"text": "The following build log for MicroPython ESP32-S3 failed. Provide a single bash command to fix it: '"$ERROR_LOG"'"}]
                }]
              }')
          
          # Extract the command and execute it (requires parsing the JSON response)
          # For now, let's log the AI's suggestion
          echo "Gemini Suggestion: $RESPONSE"
          
      - name: Final Check
        if: steps.build_step.outcome == 'failure'
        run: exit 1 # Fail the workflow after repair attempt so you can see it
